<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Đăng ký — Épice</title>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 3C14 3 8 7 8 14C8 17.5 10 21 14 24C18 21 20 17.5 20 14C20 7 14 3 14 3Z" fill="currentColor" opacity="0.9"/>
        <path d="M14 8C14 8 10 11 10 14C10 16 11 18 14 20C17 18 18 16 18 14C18 11 14 8 14 8Z" fill="#0f0f0f"/>
      </svg>
      <span>Épice</span>
    </a>
    <div class="navbar-links">
      <a th:href="@{/}">Trang chủ</a>
      <a th:href="@{/recipes/public}">Công thức</a>
    </div>
  </nav>

  <div class="page-container narrow" style="padding-top:3rem;">

    <div class="form-card">
      <div class="divider-gold" style="margin-bottom:1.5rem;"></div>
      <div class="form-title" style="text-align:center;">Tham gia cộng đồng</div>
      <div class="form-subtitle" style="text-align:center;">Tạo tài khoản để bắt đầu chia sẻ công thức</div>

      <div th:if="${error}" class="alert alert-error">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span th:text="${error}">Lỗi đăng ký</span>
      </div>

      <form th:action="@{/register}" method="post">
        <div class="form-group">
          <label class="form-label" for="username">Tên đăng nhập *</label>
          <input class="form-input" type="text" id="username" name="username" required autofocus placeholder="VD: nguyenvana"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mật khẩu *</label>
          <input class="form-input" type="password" id="password" name="password" required placeholder="Ít nhất 6 ký tự"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="displayName">Tên hiển thị</label>
          <input class="form-input" type="text" id="displayName" name="displayName" placeholder="VD: Đầu bếp Minh"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="email@example.com"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="role">Quyền</label>
          <select class="form-select" id="role" name="role">
            <option value="USER">Người dùng — Được đăng công thức (chờ duyệt)</option>
            <option value="VIEWER">Người xem — Chỉ xem công thức</option>
          </select>
          <div class="form-hint">Admin có thể nâng quyền cho bạn sau khi duyệt.</div>
        </div>
        <div class="form-actions" style="margin-top:1.5rem;">
          <button type="submit" class="btn-gold" style="flex:1; justify-content:center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
            Tạo tài khoản
          </button>
        </div>
      </form>

      <div style="text-align:center; margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--border);">
        <span style="color:var(--text-muted); font-size:0.9rem;">Đã có tài khoản? </span>
        <a th:href="@{/login}" style="color:var(--gold); text-decoration:none; font-weight:600;">Đăng nhập</a>
      </div>
    </div>

  </div>

  <footer class="footer">
    <div class="footer-brand">Épice</div>
    Nền tảng chia sẻ công thức nấu ăn cao cấp
  </footer>

</body>
</html>
